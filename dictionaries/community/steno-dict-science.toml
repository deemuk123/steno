[meta]
name        = "steno-dict-science"
description = "Research papers, scientific methodology, LLM benchmarks, and academic writing"
author      = "deemuk123"
version     = "1.0.0"
language    = "en"

[entries]
# --- Research methodology ---
"statistical significance"             = "stat-sig"
"null hypothesis"                      = "H0"
"alternative hypothesis"               = "H1"
"confidence interval"                  = "CI"
"standard deviation"                   = "SD"
"standard error"                       = "SE"
"p-value"                              = "p-val"
"effect size"                          = "eff-sz"
"sample size"                          = "n-size"
"control group"                        = "ctrl-grp"
"experimental group"                   = "exp-grp"
"randomized controlled trial"          = "RCT"
"double blind"                         = "dbl-blind"
"correlation coefficient"              = "r-coef"
"regression analysis"                  = "reg-anal"
"analysis of variance"                 = "ANOVA"
"principal component analysis"         = "PCA"
"natural language processing"          = "NLP"

# --- Academic publishing ---
"peer review"                          = "PR"
"peer reviewed"                        = "peer-rev"
"literature review"                    = "lit-rev"
"systematic review"                    = "sys-rev"
"meta-analysis"                        = "meta-anal"
"methodology section"                  = "meth-sec"
"experimental design"                  = "exp-design"
"research question"                    = "RQ"
"hypothesis testing"                   = "hyp-test"
"statistically significant"            = "stat-sig"
"not statistically significant"        = "not-sig"
"further research"                     = "further-res"
"future work"                          = "future-wk"
"in conclusion"                        = "in-concl"
"results suggest"                      = "results-sug"
"findings indicate"                    = "findings-ind"

# --- LLM / ML research terms ---
"state of the art"                     = "SOTA"
"baseline model"                       = "baseline"
"evaluation metric"                    = "eval-metric"
"ablation study"                       = "ablation"
"training data"                        = "train-data"
"test set"                             = "test-set"
"validation set"                       = "val-set"
"overfitting"                          = "overfit"
"underfitting"                         = "underfit"
"hyperparameter"                       = "hyperparam"
"cross-validation"                     = "cross-val"
"ground truth"                         = "GT"
"precision and recall"                 = "P&R"
"F1 score"                             = "F1"
"area under the curve"                 = "AUC"
"mean absolute error"                  = "MAE"
"root mean square error"               = "RMSE"
"knowledge distillation"               = "KD"
"transfer learning"                    = "TL"
"zero-shot"                            = "0-shot"
"few-shot"                             = "k-shot"
"instruction tuning"                   = "instruct-FT"
"supervised fine-tuning"               = "SFT"
"proximal policy optimization"         = "PPO"
"direct preference optimization"       = "DPO"

# --- Connectives common in papers ---
"compared to"                          = "vs"
"as shown in"                          = "see"
"with respect to"                      = "w.r.t."
"in contrast to"                       = "cf."
"on the other hand"                    = "OTOH"
"for example"                          = "e.g."
"that is"                              = "i.e."
"et cetera"                            = "etc."
"and so on"                            = "etc."
"approximately"                        = "~"
"greater than"                         = ">"
"less than"                            = "<"
