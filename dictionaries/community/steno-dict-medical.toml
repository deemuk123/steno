[meta]
name        = "steno-dict-medical"
description = "Clinical notes, medical diagnoses, pharmacology, and healthcare documentation"
author      = "deemuk123"
version     = "1.0.0"
language    = "en"

[entries]
# --- Clinical note patterns ---
"patient presents with"                = "pt c/o"
"chief complaint"                      = "CC"
"history of present illness"           = "HPI"
"past medical history"                 = "PMH"
"family history"                       = "FH"
"social history"                       = "SH"
"review of systems"                    = "ROS"
"physical examination"                 = "PE"
"assessment and plan"                  = "A/P"
"follow-up"                            = "F/U"
"as needed"                            = "PRN"
"twice daily"                          = "BID"
"three times daily"                    = "TID"
"four times daily"                     = "QID"
"once daily"                           = "QD"
"by mouth"                             = "PO"
"intravenous"                          = "IV"
"intramuscular"                        = "IM"
"subcutaneous"                         = "SQ"
"nothing by mouth"                     = "NPO"
"blood pressure"                       = "BP"
"heart rate"                           = "HR"
"respiratory rate"                     = "RR"
"temperature"                          = "T"
"oxygen saturation"                    = "SpO2"
"body mass index"                      = "BMI"
"within normal limits"                 = "WNL"
"no acute distress"                    = "NAD"

# --- Diagnoses / conditions ---
"differential diagnosis"               = "DDx"
"rule out"                             = "r/o"
"type 2 diabetes mellitus"             = "T2DM"
"hypertension"                         = "HTN"
"coronary artery disease"              = "CAD"
"congestive heart failure"             = "CHF"
"atrial fibrillation"                  = "A-fib"
"chronic obstructive pulmonary disease" = "COPD"
"urinary tract infection"              = "UTI"
"upper respiratory infection"          = "URI"
"deep vein thrombosis"                 = "DVT"
"pulmonary embolism"                   = "PE"
"myocardial infarction"                = "MI"
"cerebrovascular accident"             = "CVA"
"transient ischemic attack"            = "TIA"
"gastroesophageal reflux disease"      = "GERD"
"irritable bowel syndrome"             = "IBS"

# --- Pharmacology ---
"adverse effects"                      = "ADR"
"contraindicated"                      = "CI"
"drug interaction"                     = "DDI"
"therapeutic range"                    = "tx-range"
"mechanism of action"                  = "MOA"
"half-life"                            = "t½"
"clinical trial"                       = "clin-trial"
"randomized controlled trial"          = "RCT"
"placebo-controlled"                   = "placebo-ctrl"
"adverse drug reaction"                = "ADR"
"loading dose"                         = "LD"
"maintenance dose"                     = "MD"

# --- Anatomy / directions ---
"anterior"                             = "ant"
"posterior"                            = "post"
"superior"                             = "sup"
"inferior"                             = "inf"
"bilateral"                            = "bilat"
"unilateral"                           = "unilat"
"right side"                           = "R"
"left side"                            = "L"
"upper extremity"                      = "UE"
"lower extremity"                      = "LE"
