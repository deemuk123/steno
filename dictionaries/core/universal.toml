[meta]
name        = "steno-core"
description = "Universal LLM pattern dictionary — works across all domains"
author      = "steno-maintainers"
version     = "0.1.0"
language    = "en"

[entries]
"in order to"                        = "→"
"it is important to note that"       = "‼"
"as mentioned above"                 = "↑ref"
"the following"                      = "ff:"
"for example"                        = "e.g."
"in other words"                     = "i.e."
"with respect to"                    = "re:"
"it should be noted"                 = "note:"
"due to the fact that"               = "because"
"in the context of"                  = "ctx:"
"as a result of"                     = "∴"
"on the other hand"                  = "↔"
"in addition to"                     = "+also"
"at the same time"                   = "meanwhile"
"in conclusion"                      = "∎"
"it is worth noting"                 = "noteworthy:"
"the purpose of"                     = "purpose:"
"in this case"                       = "here:"
"more specifically"                  = "spec:"
"in summary"                         = "∑:"
